// localStorage-backed implementation of the storage API the tracker uses
window.storage = {
  async get(key) {
    const v = localStorage.getItem("cut:" + key);
    return v === null ? null : { key, value: v };
  },
  async set(key, value) {
    localStorage.setItem("cut:" + key, value);
    return { key, value };
  },
  async delete(key) {
    localStorage.removeItem("cut:" + key);
    return { key, deleted: true };
  },
  async list(prefix) {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.indexOf("cut:") === 0) {
        const bare = k.slice(4);
        if (!prefix || bare.indexOf(prefix) === 0) keys.push(bare);
      }
    }
    return { keys };
  },
};
</script>

const FOOD_DB = RAW_DB.map(([name, cal, p, c, f]) => ({ name, cal, p, c, f }));

const todayKey = () => {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `day:${y}-${m}-${day}`;
};

const prettyDate = () =>
  new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });

async function loadJSON(key, fallback) {
  try {
    const res = await window.storage.get(key);
    return res ? JSON.parse(res.value) : fallback;
  } catch {
    return fallback;
  }
}

// Photo -> macro estimation via AI. Requires the platform to support API calls
// from artifacts; if unsupported, throws and the UI falls back to chat guidance.
async function estimateFromPhoto(imageBase64, imageType) {
  const apiKey = (localStorage.getItem("anthropic-api-key") || "").trim();
  if (!apiKey) throw new Error("no API key yet — open settings (gear icon) and paste your key");
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      messages: [
        {
          role: "user",
          content: [
            {
              type: "image",
              source: { type: "base64", media_type: imageType || "image/jpeg", data: imageBase64 },
            },
            {
              type: "text",
              text: 'Estimate calories and macros for each distinct food item in this photo, using typical portion sizes. Respond ONLY with a JSON array, no markdown or preamble. Each element: {"name":"short food name with portion","calories":number,"protein":number,"carbs":number,"fat":number}',
            },
          ],
        },
      ],
    }),
  });
  const data = await response.json().catch(() => null);
  if (!response.ok || !data || data.error) {
    throw new Error(data && data.error && data.error.message ? data.error.message : "connection blocked");
  }
  const raw = Array.isArray(data.content)
    ? data.content.filter((b) => b && b.type === "text").map((b) => b.text).join("\n")
    : typeof data.content === "string" ? data.content : "";
  const clean = raw.replace(/```json|```/g, "").trim();
  const s = clean.indexOf("[");
  const e = clean.lastIndexOf("]");
  if (s === -1 || e <= s) throw new Error("couldn't read the estimate");
  const items = JSON.parse(clean.slice(s, e + 1));
  return items.map((it) => ({
    name: String(it.name || "food item"),
    cal: Math.round(Number(it.calories) || 0),
    p: Math.round(Number(it.protein) || 0),
    c: Math.round(Number(it.carbs) || 0),
    f: Math.round(Number(it.fat) || 0),
  }));
}

function MacroBar({ label, eaten, target, primary }) {
  const pct = Math.min(100, target > 0 ? (eaten / target) * 100 : 0);
  const over = eaten > target;
  return (
    <div className="w-full min-w-0">
      <div className="flex items-baseline justify-between mb-1">
        <span
          className="text-[10px] tracking-[0.14em] uppercase"
          style={{ color: primary ? "#FF8552" : "#8C919A", fontWeight: primary ? 700 : 500 }}
        >
          {label}
        </span>
        <span className="text-[11px] tabular-nums" style={{ color: over ? "#E5484D" : "#E9EAEC" }}>
          {eaten}
          <span style={{ color: "#5A5F68" }}>/{target}g</span>
        </span>
      </div>
      <div className="h-1.5 rounded-full overflow-hidden" style={{ background: "#2C3037" }}>
        <div
          className="h-full rounded-full transition-all duration-500"
          style={{
            width: `${pct}%`,
            background: over ? "#E5484D" : primary ? "#FF8552" : "#6B7280",
          }}
        />
      </div>
    </div>
  );
}

function MacroTracker() {
  const [entries, setEntries] = useState([]);
  const [targets, setTargets] = useState(DEFAULT_TARGETS);
  const [input, setInput] = useState("");
  const [error, setError] = useState("");
  const [loaded, setLoaded] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [draftTargets, setDraftTargets] = useState(DEFAULT_TARGETS);
  const [history, setHistory] = useState([]);
  const [customFoods, setCustomFoods] = useState([]);
  const [recents, setRecents] = useState([]);
  const [showCustomForm, setShowCustomForm] = useState(false);
  const [customDraft, setCustomDraft] = useState({ name: "", cal: "", p: "", c: "", f: "" });
  const [photo, setPhoto] = useState(null); // { base64, type, preview }
  const [photoBusy, setPhotoBusy] = useState(false);
  const [photoError, setPhotoError] = useState("");
  const fileRef = useRef(null);
  const [dataText, setDataText] = useState("");
  const [showData, setShowData] = useState(false);
  const [dataMsg, setDataMsg] = useState("");
  const [showPaste, setShowPaste] = useState(false);
  const [pasteText, setPasteText] = useState("");
  const [pasteMsg, setPasteMsg] = useState("");

  const logPastedEstimate = async () => {
    setPasteMsg("");
    const lines = pasteText
      .replace(/^\s*LOG:\s*/i, "")
      .split(/;|\n/)
      .map((s) => s.trim())
      .filter(Boolean);
    const items = [];
    for (const line of lines) {
      const parts = line.split("|").map((s) => s.trim());
      if (parts.length >= 5) {
        const [name, cal, p, c, f] = parts;
        items.push({
          name: name || "food item",
          cal: Math.round(Number(cal) || 0),
          p: Math.round(Number(p) || 0),
          c: Math.round(Number(c) || 0),
          f: Math.round(Number(f) || 0),
        });
      }
    }
    if (!items.length) {
      setPasteMsg("Couldn't read that. Expected: name | calories | protein | carbs | fat — one food per line.");
      return;
    }
    const stamped = items.map((it) => ({
      id: Date.now() + "-" + Math.random().toString(36).slice(2, 7),
      name: it.name,
      calories: it.cal,
      protein: it.p,
      carbs: it.c,
      fat: it.f,
      time: new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" }),
    }));
    await saveDay([...entries, ...stamped]);
    setPasteText("");
    setShowPaste(false);
    setPasteMsg("");
  };

  const exportData = async () => {
    setDataMsg("");
    const out = { settings: targets, customFoods, recents, days: {} };
    try {
      const res = await window.storage.list("day:");
      const keys = (res && res.keys) || [];
      for (const k of keys) {
        const d = await loadJSON(k, null);
        if (d) out.days[k] = d;
      }
    } catch { /* export what we have */ }
    setDataText(JSON.stringify(out));
    setShowData(true);
    setDataMsg("This is your full backup. Copy it and save it anywhere (Notes, email, etc).");
  };

  const importData = async () => {
    setDataMsg("");
    try {
      const obj = JSON.parse(dataText);
      if (obj.settings) {
        await window.storage.set("settings", JSON.stringify(obj.settings));
        setTargets(obj.settings);
        setDraftTargets(obj.settings);
      }
      if (Array.isArray(obj.customFoods)) {
        await window.storage.set("custom-foods", JSON.stringify(obj.customFoods));
        setCustomFoods(obj.customFoods);
      }
      if (Array.isArray(obj.recents)) {
        await window.storage.set("recent-foods", JSON.stringify(obj.recents));
        setRecents(obj.recents);
      }
      if (obj.days) {
        for (const k of Object.keys(obj.days)) {
          if (k.indexOf("day:") === 0) {
            // eslint-disable-next-line no-await-in-loop
            await window.storage.set(k, JSON.stringify(obj.days[k]));
          }
        }
        const today = obj.days[todayKey()];
        if (today && today.entries) setEntries(today.entries);
      }
      setDataMsg("Imported ✓ — your history is restored (past days appear on next load).");
    } catch {
      setDataMsg("Couldn't read that. Paste the exact text from Export, nothing else.");
    }
  };

  useEffect(() => {
    (async () => {
      const t = await loadJSON("settings", DEFAULT_TARGETS);
      const day = await loadJSON(todayKey(), { entries: [] });
      const cf = await loadJSON("custom-foods", []);
      const rc = await loadJSON("recent-foods", []);
      setTargets(t);
      setDraftTargets(t);
      setEntries(day.entries || []);
      setCustomFoods(Array.isArray(cf) ? cf : []);
      setRecents(Array.isArray(rc) ? rc : []);
      setLoaded(true);
      try {
        const res = await window.storage.list("day:");
        if (res && res.keys) {
          const keys = res.keys.filter((k) => k !== todayKey()).sort().slice(-7).reverse();
          const days = [];
          for (const k of keys) {
            const d = await loadJSON(k, null);
            if (d && d.entries && d.entries.length) {
              days.push({
                date: k.replace("day:", ""),
                calories: d.entries.reduce((s, e) => s + e.calories, 0),
                protein: d.entries.reduce((s, e) => s + e.protein, 0),
              });
            }
          }
          setHistory(days);
        }
      } catch { /* no history yet */ }
    })();
  }, []);

  const saveDay = async (newEntries) => {
    setEntries(newEntries);
    try {
      await window.storage.set(todayKey(), JSON.stringify({ entries: newEntries }));
    } catch {
      setError("Couldn't save that entry. Try again.");
    }
  };

  const logFood = async (food, mult) => {
    setError("");
    const m = mult || 1;
    const entry = {
      id: Date.now() + "-" + Math.random().toString(36).slice(2, 7),
      name: m === 1 ? food.name : food.name + " ×" + m,
      calories: Math.round(food.cal * m),
      protein: Math.round(food.p * m),
      carbs: Math.round(food.c * m),
      fat: Math.round(food.f * m),
      time: new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" }),
    };
    await saveDay([...entries, entry]);
    setInput("");
    const newRecents = [food, ...recents.filter((r) => r.name !== food.name)].slice(0, 8);
    setRecents(newRecents);
    try {
      await window.storage.set("recent-foods", JSON.stringify(newRecents));
    } catch { /* recents are nice-to-have */ }
  };

  const removeEntry = async (id) => {
    await saveDay(entries.filter((e) => e.id !== id));
  };

  const handlePhotoPick = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setPhotoError("");
    const reader = new FileReader();
    reader.onload = () => {
      const dataUrl = String(reader.result);
      setPhoto({ base64: dataUrl.split(",")[1], type: file.type || "image/jpeg", preview: dataUrl });
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  };

  const analyzePhoto = async () => {
    if (!photo) return;
    setPhotoBusy(true);
    setPhotoError("");
    try {
      const items = await estimateFromPhoto(photo.base64, photo.type);
      if (!items.length) throw new Error("no food recognized");
      const stamped = items.map((it) => ({
        id: Date.now() + "-" + Math.random().toString(36).slice(2, 7),
        name: it.name,
        calories: it.cal,
        protein: it.p,
        carbs: it.c,
        fat: it.f,
        time: new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" }),
      }));
      await saveDay([...entries, ...stamped]);
      setPhoto(null);
    } catch (err) {
      setPhotoError(
        "Couldn't analyze the photo (" + (err && err.message ? err.message : "unknown error") + "). You can also paste an estimate below."
      );
    } finally {
      setPhotoBusy(false);
    }
  };

  const saveCustomFood = async () => {
    const food = {
      name: customDraft.name.trim() || "Custom food",
      cal: Math.max(0, Number(customDraft.cal) || 0),
      p: Math.max(0, Number(customDraft.p) || 0),
      c: Math.max(0, Number(customDraft.c) || 0),
      f: Math.max(0, Number(customDraft.f) || 0),
    };
    const updated = [food, ...customFoods.filter((x) => x.name !== food.name)];
    setCustomFoods(updated);
    setShowCustomForm(false);
    setCustomDraft({ name: "", cal: "", p: "", c: "", f: "" });
    try {
      await window.storage.set("custom-foods", JSON.stringify(updated));
    } catch { /* still log it */ }
    await logFood(food, 1);
  };

  const saveTargets = async () => {
    const t = {
      calories: Math.max(0, Number(draftTargets.calories) || 0),
      protein: Math.max(0, Number(draftTargets.protein) || 0),
      carbs: Math.max(0, Number(draftTargets.carbs) || 0),
      fat: Math.max(0, Number(draftTargets.fat) || 0),

    setShowSettings(false);
    try {
      await window.storage.set("settings", JSON.stringify(t));
    } catch {
      setError("Couldn't save targets.");
    }
  };

  // Multi-word search: every word must appear somewhere in the food name
  const q = input.trim().toLowerCase();

  const matches = tokens.length
    ? [...customFoods, ...FOOD_DB]
        .filter((fd) => {
          const n = fd.name.toLowerCase();
          return tokens.every((t) => n.includes(t));
        })
        .slice(0, 8)
    : [];

  const totals = entries.reduce(
    (s, e) => ({
      calories: s.calories + e.calories,
      protein: s.protein + e.protein,
      carbs: s.carbs + e.carbs,
      fat: s.fat + e.fat,
    }),
    { calories: 0, protein: 0, carbs: 0, fat: 0 }
  );
  const remaining = targets.calories - totals.calories;

  if (!loaded) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{ background: "#15171B" }}>
        <div className="text-sm" style={{ color: "#8C919A" }}>Loading…</div>
      </div>
    );
  }

  const inputStyle = { background: "#15171B", border: "1px solid #2C3037", color: "#E9EAEC" };

        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=Inter:wght@400;500;600&display=swap');

        {showSettings && (
          <div className="mb-6 p-4 rounded-xl" style={{ background: "#1E2127", border: "1px solid #2C3037" }}>
            <div className="display text-xs tracking-[0.18em] uppercase mb-3" style={{ color: "#8C919A" }}>
              Daily targets
            </div>
            <div className="grid grid-cols-2 gap-3">
              {[["calories", "Calories"], ["protein", "Protein (g)"], ["carbs", "Carbs (g)"], ["fat", "Fat (g)"]].map(([k, label]) => (
                <label key={k} className="block">
                  <span className="text-[11px]" style={{ color: "#8C919A" }}>{label}</span>
                  <input
                    type="number"
                    inputMode="numeric"
                    value={draftTargets[k]}
                    onChange={(e) => setDraftTargets({ ...draftTargets, [k]: e.target.value })}
                    className="mt-1 w-full px-3 py-2 rounded-lg text-sm focus:outline-none focus-visible:ring-2"
                    style={inputStyle}
                  />
                </label>
              ))}
            </div>
            <button
              onClick={saveTargets}
              className="mt-3 w-full py-2 rounded-lg text-sm font-semibold flex items-center justify-center gap-1.5 focus:outline-none focus-visible:ring-2"
              style={{ background: "#FF8552", color: "#15171B" }}
            >
              <Check className="w-4 h-4" /> Save targets
            </button>

            {/* Photo analysis key */}
            <div className="mt-4 pt-3" style={{ borderTop: "1px solid #2C3037" }}>
              <div className="display text-xs tracking-[0.18em] uppercase mb-2" style={{ color: "#8C919A" }}>
                Photo analysis — API key
              </div>
              <input
                type="password"
                defaultValue={localStorage.getItem("anthropic-api-key") || ""}
                onChange={(e) => localStorage.setItem("anthropic-api-key", e.target.value.trim())}
                placeholder="sk-ant-…"
                className="w-full px-3 py-2 rounded-lg text-sm focus:outline-none focus-visible:ring-2"
                style={inputStyle}
              />
              <div className="mt-1.5 text-[10px]" style={{ color: "#5A5F68" }}>
                Enables the camera. Stored only on this device. Get a key at console.anthropic.com.
              </div>
            </div>

            {/* Backup & move */}
            <div className="mt-4 pt-3" style={{ borderTop: "1px solid #2C3037" }}>
              <div className="display text-xs tracking-[0.18em] uppercase mb-2" style={{ color: "#8C919A" }}>
                Backup & move
              </div>
              <div className="flex gap-2">
                <button
                  onClick={exportData}
                  className="flex-1 py-2 rounded-lg text-xs focus:outline-none focus-visible:ring-2"
                  style={{ border: "1px solid #2C3037", color: "#E9EAEC" }}
                >
                  Export data
                </button>
                <button
                  onClick={() => { setShowData(true); setDataText(""); setDataMsg("Paste your exported backup below, then tap Import."); }}
                  className="flex-1 py-2 rounded-lg text-xs focus:outline-none focus-visible:ring-2"
                  style={{ border: "1px solid #2C3037", color: "#E9EAEC" }}
                >
                  Import data
                </button>
              </div>
              {showData && (
                <div className="mt-2">
                  <textarea
                    value={dataText}
                    onChange={(e) => setDataText(e.target.value)}
                    rows={4}
                    className="w-full px-3 py-2 rounded-lg text-[11px] focus:outline-none focus-visible:ring-2"
                    style={{ background: "#15171B", border: "1px solid #2C3037", color: "#E9EAEC", fontFamily: "monospace" }}
                  />
                  <div className="flex gap-2 mt-1.5">
                    <button
                      onClick={async () => {
                        try {
                          await navigator.clipboard.writeText(dataText);
                          setDataMsg("Copied to clipboard ✓");
                        } catch {
                          setDataMsg("Couldn't auto-copy — select the text and copy it manually.");
                        }
                      }}
                      className="flex-1 py-1.5 rounded-lg text-xs focus:outline-none focus-visible:ring-2"
                      style={{ border: "1px solid #2C3037", color: "#8C919A" }}
                    >
                      Copy
                    </button>
                    <button
                      onClick={importData}
                      className="flex-1 py-1.5 rounded-lg text-xs font-semibold focus:outline-none focus-visible:ring-2"
                      style={{ background: "#FF8552", color: "#15171B" }}
                    >
                      Import
                    </button>
                  </div>
                </div>
              )}
              {dataMsg && <div className="mt-2 text-[11px]" style={{ color: "#8C919A" }}>{dataMsg}</div>}
            </div>
          </div>
        )}

        {/* Hero: remaining */}
        <div className="mb-2">
          <div
            className="display tabular-nums leading-none"
            style={{ fontSize: "clamp(48px, 16vw, 72px)", fontWeight: 600, color: remaining < 0 ? "#E5484D" : "#E9EAEC" }}
          >
            {Math.abs(remaining).toLocaleString()}
          </div>
          <div className="text-xs tracking-[0.14em] uppercase mt-1" style={{ color: "#8C919A" }}>
            {remaining >= 0 ? "calories left today" : "calories over target"}
            <span style={{ color: "#5A5F68" }}> · {totals.calories.toLocaleString()} / {targets.calories.toLocaleString()} eaten</span>
          </div>
        </div>

        {/* Macro bars */}
        <div className="flex flex-col gap-3 mt-5 mb-7 w-full">
          <MacroBar label="Protein" eaten={totals.protein} target={targets.protein} primary />
          <MacroBar label="Carbs" eaten={totals.carbs} target={targets.carbs} />
          <MacroBar label="Fat" eaten={totals.fat} target={targets.fat} />
        </div>

        {/* Search & log */}
        <div className="p-3 rounded-xl mb-6" style={{ background: "#1E2127", border: "1px solid #2C3037" }}>
          <div className="flex gap-2">
            <div className="relative flex-1 min-w-0">
              <Search className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2" style={{ color: "#5A5F68" }} />
              <input
                value={input}
                onChange={(e) => { setInput(e.target.value); setError(""); setShowCustomForm(false); }}
                placeholder='Try "big mac", "pad thai"…'
                className="w-full pl-9 pr-3 py-2.5 rounded-lg text-sm focus:outline-none focus-visible:ring-2"
                style={inputStyle}
              />
            </div>
            <button
              onClick={() => fileRef.current && fileRef.current.click()}
              aria-label="Snap or upload a photo of your meal"
              className="px-3 rounded-lg focus:outline-none focus-visible:ring-2"
              style={{ background: "#15171B", border: "1px solid #2C3037" }}
            >
              <Camera className="w-4 h-4" style={{ color: "#8C919A" }} />
            </button>
            <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handlePhotoPick} className="hidden" />
          </div>

          {/* Photo preview & analyze */}
          {photo && (
            <div className="mt-3 p-2.5 rounded-lg flex items-center gap-3" style={{ background: "#15171B", border: "1px solid #2C3037" }}>
              <img src={photo.preview} alt="Meal to analyze" className="h-14 w-14 object-cover rounded-md flex-shrink-0" />
              <button
                onClick={analyzePhoto}
                disabled={photoBusy}
                className="flex-1 py-2 rounded-lg text-sm font-semibold flex items-center justify-center gap-1.5 focus:outline-none focus-visible:ring-2 disabled:opacity-50"
                style={{ background: "#FF8552", color: "#15171B" }}
              >
                {photoBusy ? <Loader2 className="w-4 h-4 animate-spin" /> : null}
                {photoBusy ? "Analyzing…" : "Estimate & log"}
              </button>
              <button onClick={() => { setPhoto(null); setPhotoError(""); }} aria-label="Remove photo"
                className="p-1.5 focus:outline-none focus-visible:ring-2">
                <X className="w-4 h-4" style={{ color: "#5A5F68" }} />
              </button>
            </div>
          )}
          {photoError && <div className="mt-2 text-xs" style={{ color: "#E5484D" }}>{photoError}</div>}

          {/* Paste estimate from chat */}
          {!showPaste ? (
            <button
              onClick={() => { setShowPaste(true); setPasteMsg(""); }}
              className="mt-3 w-full py-2 rounded-lg text-xs flex items-center justify-center gap-1 focus:outline-none focus-visible:ring-2"
              style={{ border: "1px dashed #2C3037", color: "#8C919A" }}
            >
              <Plus className="w-3.5 h-3.5" /> Paste a photo estimate from chat
            </button>
          ) : (
            <div className="mt-3 p-3 rounded-lg" style={{ background: "#15171B", border: "1px solid #2C3037" }}>
              <div className="flex items-center justify-between mb-2">
                <span className="text-[10px] tracking-[0.14em] uppercase" style={{ color: "#8C919A" }}>Paste estimate</span>
                <button onClick={() => setShowPaste(false)} aria-label="Close paste panel">
                  <X className="w-4 h-4" style={{ color: "#5A5F68" }} />
                </button>
              </div>
              <textarea
                value={pasteText}
                onChange={(e) => setPasteText(e.target.value)}
                rows={3}
                placeholder={"Steak (6 oz) | 420 | 40 | 0 | 28\nMac & cheese | 470 | 17 | 45 | 25"}
                className="w-full px-3 py-2 rounded-lg text-[12px] focus:outline-none focus-visible:ring-2"
                style={{ background: "#1E2127", border: "1px solid #2C3037", color: "#E9EAEC", fontFamily: "monospace" }}
              />
              <button
                onClick={logPastedEstimate}
                className="mt-2 w-full py-2 rounded-lg text-sm font-semibold focus:outline-none focus-visible:ring-2"
                style={{ background: "#FF8552", color: "#15171B" }}
              >
                Log all items
              </button>
              <div className="mt-2 text-[10px]" style={{ color: "#5A5F68" }}>
                Send a food photo to me in chat and ask for "the LOG line" — copy my reply, paste it here, done.
              </div>
              {pasteMsg && <div className="mt-1.5 text-[11px]" style={{ color: "#E5484D" }}>{pasteMsg}</div>}
            </div>
          )}

          {/* Recents (when not searching) */}
          {!q && recents.length > 0 && !showCustomForm && (
            <div className="mt-3">
              <div className="text-[10px] tracking-[0.14em] uppercase mb-1.5" style={{ color: "#5A5F68" }}>
                Recent — tap to log
              </div>
              <div className="flex flex-wrap gap-1.5">
                {recents.map((r) => (
                  <button
                    key={r.name}
                    onClick={() => logFood(r, 1)}
                    className="px-2.5 py-1.5 rounded-full text-xs focus:outline-none focus-visible:ring-2"
                    style={{ background: "#15171B", border: "1px solid #2C3037", color: "#E9EAEC" }}
                  >
                    {r.name}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Matches */}
          {q && matches.length > 0 && (
            <div className="mt-2 space-y-1">
              {matches.map((fd) => (
                <div key={fd.name} className="flex items-center gap-2 px-2.5 py-2 rounded-lg" style={{ background: "#15171B" }}>
                  <div className="flex-1 min-w-0">
                    <div className="text-[13px] font-medium leading-tight">{fd.name}</div>
                    <div className="text-[11px] tabular-nums" style={{ color: "#8C919A" }}>
                      {fd.cal} cal · <span style={{ color: "#FF8552" }}>{fd.p}p</span> · {fd.c}c · {fd.f}f
                    </div>
                  </div>
                  <button onClick={() => logFood(fd, 0.5)} aria-label={"Log half serving of " + fd.name}
                    className="px-2 py-1.5 rounded-md text-xs focus:outline-none focus-visible:ring-2"
                    style={{ border: "1px solid #2C3037", color: "#8C919A" }}>½</button>
                  <button onClick={() => logFood(fd, 1)} aria-label={"Log one serving of " + fd.name}
                    className="px-2.5 py-1.5 rounded-md text-xs font-semibold focus:outline-none focus-visible:ring-2"
                    style={{ background: "#FF8552", color: "#15171B" }}>Add</button>
                  <button onClick={() => logFood(fd, 2)} aria-label={"Log two servings of " + fd.name}
                    className="px-2 py-1.5 rounded-md text-xs focus:outline-none focus-visible:ring-2"
                    style={{ border: "1px solid #2C3037", color: "#8C919A" }}>2×</button>
                </div>
              ))}
            </div>
          )}

          {q && matches.length === 0 && !showCustomForm && (
            <div className="mt-3 text-xs" style={{ color: "#8C919A" }}>
              No match for "{input.trim()}" — add it as a custom food below, or ask me in chat for its macros.
            </div>
          )}

          {/* Custom food */}
          {!showCustomForm ? (
            <button
              onClick={() => { setShowCustomForm(true); setCustomDraft({ ...customDraft, name: input.trim() }); }}
              className="mt-3 w-full py-2 rounded-lg text-xs flex items-center justify-center gap-1 focus:outline-none focus-visible:ring-2"
              style={{ border: "1px dashed #2C3037", color: "#8C919A" }}
            >
              <Plus className="w-3.5 h-3.5" /> Add a custom food
            </button>
          ) : (
            <div className="mt-3 p-3 rounded-lg" style={{ background: "#15171B", border: "1px solid #2C3037" }}>
              <div className="flex items-center justify-between mb-2">
                <span className="text-[10px] tracking-[0.14em] uppercase" style={{ color: "#8C919A" }}>New custom food</span>
                <button onClick={() => setShowCustomForm(false)} aria-label="Close custom food form">
                  <X className="w-4 h-4" style={{ color: "#5A5F68" }} />
                </button>
              </div>
              <input
                value={customDraft.name}
                onChange={(e) => setCustomDraft({ ...customDraft, name: e.target.value })}
                placeholder="Name (e.g. Mom's lasagna, 1 slice)"
                className="w-full px-3 py-2 rounded-lg text-sm mb-2 focus:outline-none focus-visible:ring-2"
                style={{ background: "#1E2127", border: "1px solid #2C3037", color: "#E9EAEC" }}
              />
              <div className="grid grid-cols-4 gap-2">
                {[["cal", "Cal"], ["p", "Prot"], ["c", "Carb"], ["f", "Fat"]].map(([k, label]) => (
                  <label key={k} className="block">
                    <span className="text-[10px]" style={{ color: "#8C919A" }}>{label}</span>
                    <input
                      type="number"
                      inputMode="numeric"
                      value={customDraft[k]}
                      onChange={(e) => setCustomDraft({ ...customDraft, [k]: e.target.value })}
                      className="mt-0.5 w-full px-2 py-1.5 rounded-lg text-sm focus:outline-none focus-visible:ring-2"
                      style={{ background: "#1E2127", border: "1px solid #2C3037", color: "#E9EAEC" }}
                    />
                  </label>
                ))}
              </div>
              <button
                onClick={saveCustomFood}
                className="mt-2.5 w-full py-2 rounded-lg text-sm font-semibold focus:outline-none focus-visible:ring-2"
                style={{ background: "#FF8552", color: "#15171B" }}
              >
                Save & log it
              </button>
              <div className="mt-2 text-[10px]" style={{ color: "#5A5F68" }}>
                Don't know the macros? Ask me in the chat — I'll estimate them for you.
              </div>
            </div>
          )}

          {error && <div className="mt-2 text-xs" style={{ color: "#E5484D" }}>{error}</div>}
        </div>

        {/* Today's entries */}
        <div className="display text-xs tracking-[0.18em] uppercase mb-2" style={{ color: "#8C919A" }}>
          Today's log
        </div>
        {entries.length === 0 ? (
          <div className="py-8 px-3 text-center text-sm rounded-xl" style={{ color: "#5A5F68", border: "1px dashed #2C3037" }}>
            Nothing logged yet. Search a food above to get started.
          </div>
        ) : (
          <div className="space-y-2">
            {entries.map((e) => (
              <div key={e.id} className="flex items-center gap-3 px-3 py-2.5 rounded-xl" style={{ background: "#1E2127", border: "1px solid #2C3037" }}>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium truncate">{e.name}</div>
                  <div className="text-[11px] tabular-nums" style={{ color: "#8C919A" }}>
                    {e.calories} cal · <span style={{ color: "#FF8552" }}>{e.protein}p</span> · {e.carbs}c · {e.fat}f
                    <span style={{ color: "#5A5F68" }}> · {e.time}</span>
                  </div>
                </div>
                <button onClick={() => removeEntry(e.id)} aria-label={"Delete " + e.name}
                  className="p-1.5 rounded-lg focus:outline-none focus-visible:ring-2">
                  <Trash2 className="w-4 h-4" style={{ color: "#5A5F68" }} />
                </button>
              </div>
            ))}
          </div>
        )}

        {/* History */}
        {history.length > 0 && (
          <div className="mt-8">
            <div className="display text-xs tracking-[0.18em] uppercase mb-2" style={{ color: "#8C919A" }}>
              Last days
            </div>
            <div className="space-y-1.5">
              {history.map((d) => (
                <div key={d.date} className="flex items-center justify-between text-xs px-3 py-2 rounded-lg" style={{ background: "#1A1D22" }}>
                  <span style={{ color: "#8C919A" }}>
                    {new Date(d.date + "T12:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" })}
                  </span>
                  <span className="tabular-nums">
                    {d.calories.toLocaleString()} cal · <span style={{ color: "#FF8552" }}>{d.protein}g protein</span>
                  </span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<MacroTracker />);

</script>
</body>
</html>
